# Netlify configuration (MUST live at the repository root)
# Builds the React app in /frontend and publishes the compiled build folder.

[build]
  base = "frontend"
  command = "yarn install && yarn build"
  publish = "build"

# SPA fallback: serve index.html for client-side routes.
# Real static files (e.g. /static/js/*.js) are served first by Netlify,
# so this only applies to unknown routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set REACT_APP_BACKEND_URL in Netlify UI:
# Site settings -> Environment variables -> REACT_APP_BACKEND_URL = https://<your-backend-host>
